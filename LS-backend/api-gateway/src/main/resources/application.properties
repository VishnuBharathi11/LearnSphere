# ===============================
# SERVER
# ===============================
server.port=8080

spring.application.name=api-gateway

# ===============================
# AUTH SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# ===============================
# COURSE SERVICE ROUTE
# ===============================
spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/courses/**

# ===============================
# PAYMENT & ENROLLMENT SERVICE
# ===============================
spring.cloud.gateway.routes[2].id=payment-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/payments/**,/enrollments/**

# ===============================
# LEARNING SERVICE
# ===============================
spring.cloud.gateway.routes[3].id=learning-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/learning/**

# ===============================
# DISCUSSION SERVICE
# ===============================
spring.cloud.gateway.routes[4].id=discussion-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/discussion/**,/notifications/**

# ===============================
# ADMIN SERVICE
# ===============================
spring.cloud.gateway.routes[5].id=admin-service
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/admin/**

# ===============================
# CORS
# ===============================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=DEBUG
