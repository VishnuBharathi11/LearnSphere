server.port=8084
spring.application.name=api-gateway

# ================= ROUTES =================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:9097
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# ENROLLMENT SERVICE
spring.cloud.gateway.routes[1].id=enrollment-service
spring.cloud.gateway.routes[1].uri=http://localhost:9092
spring.cloud.gateway.routes[1].predicates[0]=Path=/payments/**,/enrollments/**

# DISCUSSION SERVICE
spring.cloud.gateway.routes[2].id=discussion-service
spring.cloud.gateway.routes[2].uri=http://localhost:9091
spring.cloud.gateway.routes[2].predicates[0]=Path=/discussion/**

# ADMIN SERVICE
spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=http://localhost:8085
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**

# DEBUG LOGS
logging.level.org.springframework.cloud.gateway=DEBUG
