spring.application.name=enrollment-service
server.port=9092
spring.datasource.url=jdbc:mysql://localhost:3306/learnsphere_db
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Razorpay
razorpay.key=YOUR_KEY
razorpay.secret=YOUR_SECRET


jwt.secret=learnsphere-super-secure-jwt-secret-key-2026-project-auth-service
jwt.expiration=86400000

# Disable default generated Spring Security user/password
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
