server.port=9092

spring.datasource.url=jdbc:mysql://localhost:3306/learnsphere_db
spring.datasource.username=root
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT CONFIG
jwt.secret=learnsphere-super-secure-jwt-secret-key-2026-project-auth-service
jwt.access-expiration=86400000
admin.analytics.events.base-url=http://localhost:9097

# MAIL CONFIG
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

app.mail.from=Vishnu <learnspheredemo@gmail.com>
auth.otp-expiration-minutes=10
