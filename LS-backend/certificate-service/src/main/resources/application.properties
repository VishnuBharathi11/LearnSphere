spring.application.name=certificate-service
server.port=9099

spring.datasource.url=jdbc:mysql://localhost:3306/learnsphere_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

certificate.public-base-url=http://localhost:5173
certificate.render-base-url=http://localhost:5173
certificate.storage.local-root=storage/certificates
certificate.pdf.node-command=node
certificate.pdf.script-path=scripts/render-certificate-pdf.mjs
certificate.pdf.timeout-seconds=60

spring.security.oauth2.resourceserver.jwt.secret-key=learnsphere-super-secure-jwt-secret-key-2026-project-auth-service
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.com.learnsphere.certificate=INFO
